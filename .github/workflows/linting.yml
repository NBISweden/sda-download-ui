name: "Linting action"

on: [pull_request]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: "Linting (eslint)"
        working-directory: frontend
        run: npm run lint

      - name: "Check with Prettier"
        if: always()
        working-directory: frontend
        run: npm run format
